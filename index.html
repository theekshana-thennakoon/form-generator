<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Form - AutoCheck</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css?v=1.7">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Clean URL to hide .html (Only works if using a web server, prevents breaking local files)
        if (window.location.protocol !== 'file:' && window.location.pathname.endsWith('.html')) {
            const clean = window.location.pathname.replace(/\.html$/, '') + window.location.search + window.location.hash;
            window.history.replaceState(null, '', clean);
        }
    </script>
    <style>
        .dynamic-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            animation: slideUp 0.5s ease-out;
        }

        .dynamic-form-card {
            position: relative;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            transition: var(--transition);
            overflow: hidden;
            z-index: 1;
        }

        .dynamic-header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 24px;
            margin-bottom: 32px;
            text-align: center;
        }

        .dynamic-header h1 {
            color: #ffffff;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .dyn-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dyn-label {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
        }

        .dyn-input {
            padding: 16px;
            border: 2px solid transparent;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            width: 100%;
            background: var(--secondary);
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .dyn-input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
        }

        textarea.dyn-input {
            min-height: 150px;
            border: 2px solid var(--primary);
            resize: vertical;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 15px;
            background: var(--secondary);
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .radio-label:hover {
            background: #fff;
            border-color: var(--border);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .radio-label input[type="radio"],
        .radio-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        /* Checklist Table Layout */
        .checklist-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 28px;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--primary);
            counter-reset: question-counter;
        }
        .checklist-table tbody tr {
            counter-increment: question-counter;
        }
        .checklist-table th, .checklist-table td {
            border: 1px solid var(--primary);
            padding: 14px 16px;
            text-align: center;
            vertical-align: middle;
        }
        .checklist-table td.num-col::before {
            content: counter(question-counter) ".";
        }
        .checklist-table th:first-child, .checklist-table td.num-col {
            width: 40px;
            font-weight: 700;
            color: var(--primary);
        }
        .checklist-table th {
            background: var(--secondary);
            font-weight: 700;
            color: var(--text-main);
            font-size: 14px;
        }
        .checklist-table td.desc-col {
            text-align: left;
            font-weight: 600;
            color: var(--text-main);
            width: auto;
            font-size: 14px;
        }
        .checklist-table th:nth-child(n+3),
        .checklist-table td:nth-child(n+3) {
            min-width: 60px;
            width: auto;
            word-wrap: break-word;
            white-space: normal;
        }
        .checklist-table td.remarks-col {
            width: 25%;
            padding: 8px;
        }
        .checklist-table td.remarks-col input {
            width: 100%;
            border: 1px solid transparent;
            background: transparent;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .checklist-table td.remarks-col input:focus {
            outline: none;
            background: var(--secondary);
            border-color: var(--border);
            border-radius: 6px;
        }
        .checklist-table input[type="radio"] {
            width: 22px;
            height: 22px;
            accent-color: var(--primary);
            cursor: pointer;
            margin: 0 auto;
            display: block;
        }
        .checklist-table tr:hover {
            background-color: #fafbfc;
        }

        .btn-large {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-large:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #loading-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
        }

        .colorful-spinner {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ff007f, #7f00ff, #007fff, #00ff7f, #7fff00, #ff7f00, #ff007f);
            animation: spin 1.5s linear infinite;
            position: relative;
            box-shadow: 0 0 30px rgba(127, 0, 255, 0.4);
            margin-bottom: 30px;
        }

        .colorful-spinner::after {
            content: '';
            position: absolute;
            inset: 6px;
            background: var(--bg-main, #f4f7f6);
            border-radius: 50%;
            z-index: 1;
        }

        .loading-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #ff007f, #007fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s ease-in-out infinite;
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        #error-view {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--danger);
        }
        #custom-combined-header {
            height: 240px; 
            border-radius: 16px 16px 0 0; 
            margin: -48px -48px 24px -48px; 
            background-image: url('images/truck.jpg'); 
            background-size: cover; 
            background-position: center; 
            position: relative; 
            overflow: hidden; 
            border-bottom: 4px solid var(--primary); 
            box-shadow: var(--shadow-sm);
        }

        .header-gradient-overlay {
            position: absolute; top: 0; left: 0; width: 70%; height: 100%; 
            background: linear-gradient(to right, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.8) 40%, rgba(255,255,255,0) 100%);
        }

        .header-logo {
            position: absolute; top: 25px; left: 30px; max-height: 70px; z-index: 10; padding: 10px; 
            background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-title {
            position: absolute; bottom: 30px; left: 30px; z-index: 10; margin: 0; font-size: 32px; color: #ffffff; 
            font-weight: 800; max-width: 85%; text-shadow: 2px 2px 8px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.5);
        }
        
        /* Mobile Responsive Tweaks */
        @media (max-width: 768px) {
            .dynamic-form-card {
                padding: 24px 16px;
            }
            #custom-combined-header {
                height: 180px;
                margin: -24px -16px 24px -16px;
                border-radius: 16px 16px 0 0;
            }
            .header-logo {
                top: 12px; left: 12px; max-height: 45px;
            }
            .header-title {
                bottom: 15px; left: 15px; font-size: 24px; max-width: calc(100% - 30px); line-height: 1.3;
            }
            .checklist-table {
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .checklist-table th, .checklist-table td {
                padding: 8px 4px;
                font-size: 13px;
            }
            .checklist-table th:first-child, .checklist-table td.num-col {
                width: 25px;
            }
            .checklist-table th:nth-child(n+3),
            .checklist-table td:nth-child(n+3) {
                min-width: 40px;
                width: auto;
                word-wrap: break-word;
                white-space: normal;
            }
            .checklist-table td.desc-col {
                font-size: 13px;
                min-width: 140px;
                max-width: none;
                word-wrap: break-word;
                white-space: normal;
            }
            .checklist-table input[type="radio"] {
                width: 18px;
                height: 18px;
                margin: 0 auto;
                display: block;
            }
        }

        #success-view {
            display: none;
            text-align: center;
            padding: 60px;
        }
    </style>
</head>

<body>
    <div class="dynamic-container">

        <div id="loading-view">
            <div class="colorful-spinner"></div>
            <div class="loading-text">Loading Form...</div>
        </div>

        <div id="error-view" class="card">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <h2 style="margin-bottom: 12px;">Oops! Something went wrong</h2>
            <p id="error-text" style="color: var(--text-color);">Form not found or invalid URL.</p>
        </div>

        <div id="success-view" class="card">
            <h2 style="color: var(--success); margin-bottom: 12px;">Success!</h2>
            <p>Your response has been recorded successfully.</p>
            <button class="btn btn-primary" style="margin-top:20px;" onclick="location.reload()">Submit Another</button>
        </div>

        <form id="dynamic-form" style="display: none;">
            <div class="card dynamic-form-card">
                <div class="dynamic-header">
                    <!-- Combined Custom Header for INSEE -->
                    <div id="custom-combined-header">
                        <!-- Gradient overlay to make logo pop -->
                        <div class="header-gradient-overlay"></div>
                        
                        <img src="images/logo.png" alt="INSEE Logo" class="header-logo">
                        
                        <h1 id="form-title" class="header-title">Form Title</h1>
                    </div>
                    <img id="form-header-image" src="" alt="Header Image" style="display: none; width: 100%; height: 200px; border-radius: 8px; margin: 0 auto 16px auto; object-fit: cover;">
                    <p id="form-description-text"
                        style="color: var(--text-muted); margin-top: 12px; font-size: 15px; display: none; white-space: pre-wrap;">
                    </p>
                </div>

                <div id="form-fields">
                    <!-- Dynamic inputs rendered here -->
                </div>

                <div class="form-actions" style="margin-top: 32px; align-items: flex-start;">
                    <button type="submit" class="btn btn-primary btn-large" id="submit-btn">Submit Response</button>
                    <span id="submit-status" style="margin-top: 12px;"></span>
                </div>
            </div>
        </form>

    </div>

    <!-- Need google.js just for the GOOGLE_APP_SCRIPT_URL constant -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/google.js?v=1.7"></script>
    <script src="js/app.js?v=1.7"></script>
</body>

</html>
