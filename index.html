<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Form - AutoCheck</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Clean URL to hide .html (Only works if using a web server, prevents breaking local files)
        if (window.location.protocol !== 'file:' && window.location.pathname.endsWith('.html')) {
            const clean = window.location.pathname.replace(/\.html$/, '') + window.location.search + window.location.hash;
            window.history.replaceState(null, '', clean);
        }
    </script>
    <style>
        .dynamic-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            animation: slideUp 0.5s ease-out;
        }

        .dynamic-form-card {
            position: relative;
            padding: 48px;
            border-radius: 16px;
            border: none;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            background: transparent;
            transition: var(--transition);
            overflow: hidden;
            z-index: 1;
        }

        /* Rotating Gradient */
        .dynamic-form-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 70%, var(--primary) 100%);
            animation: rotateBorder 4s linear infinite;
            z-index: -2;
        }

        /* Inner Card Background */
        .dynamic-form-card::after {
            content: '';
            position: absolute;
            inset: 3px;
            /* Border thickness */
            background: var(--card-bg);
            border-radius: 14px;
            z-index: -1;
        }

        @keyframes rotateBorder {
            100% {
                transform: rotate(360deg);
            }
        }

        .dynamic-header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 24px;
            margin-bottom: 32px;
            text-align: center;
        }

        .dynamic-header h1 {
            color: var(--primary);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .dyn-group {
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dyn-label {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
        }

        .dyn-input {
            padding: 16px;
            border: 2px solid transparent;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            width: 100%;
            background: var(--secondary);
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .dyn-input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 15px;
            background: var(--secondary);
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .radio-label:hover {
            background: #fff;
            border-color: var(--border);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .radio-label input[type="radio"],
        .radio-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .btn-large {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-large:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #loading-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
        }

        .colorful-spinner {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ff007f, #7f00ff, #007fff, #00ff7f, #7fff00, #ff7f00, #ff007f);
            animation: spin 1.5s linear infinite;
            position: relative;
            box-shadow: 0 0 30px rgba(127, 0, 255, 0.4);
            margin-bottom: 30px;
        }

        .colorful-spinner::after {
            content: '';
            position: absolute;
            inset: 6px;
            background: var(--bg-main, #f4f7f6);
            border-radius: 50%;
            z-index: 1;
        }

        .loading-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #ff007f, #007fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s ease-in-out infinite;
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        #error-view {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--danger);
        }

        #success-view {
            display: none;
            text-align: center;
            padding: 60px;
        }
    </style>
</head>

<body>
    <div class="dynamic-container">

        <div id="loading-view">
            <div class="colorful-spinner"></div>
            <div class="loading-text">Loading Form...</div>
        </div>

        <div id="error-view" class="card">
            <h2>Error</h2>
            <p id="error-text">Form not found or invalid URL.</p>
        </div>

        <div id="success-view" class="card">
            <h2 style="color: var(--success); margin-bottom: 12px;">Success!</h2>
            <p>Your response has been recorded successfully.</p>
            <button class="btn btn-primary" style="margin-top:20px;" onclick="location.reload()">Submit Another</button>
        </div>

        <form id="dynamic-form" style="display: none;">
            <div class="card dynamic-form-card">
                <div class="dynamic-header">
                    <h1 id="form-title">Form Title</h1>
                    <p id="form-description-text"
                        style="color: var(--text-muted); margin-top: 12px; font-size: 15px; display: none; white-space: pre-wrap;">
                    </p>
                </div>

                <div id="form-fields">
                    <!-- Dynamic inputs rendered here -->
                </div>

                <div class="form-actions" style="margin-top: 32px; align-items: flex-start;">
                    <button type="submit" class="btn btn-primary btn-large" id="submit-btn">Submit Response</button>
                    <span id="submit-status" style="margin-top: 12px;"></span>
                </div>
            </div>
        </form>

    </div>

    <!-- Need google.js just for the GOOGLE_APP_SCRIPT_URL constant -->
    <script src="js/google.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
